<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Test Autocomplete Lieu</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f0ff; padding: 40px; }
h1 { color: #7c3aed; margin-bottom: 20px; }
.wrapper { max-width: 600px; margin: 0 auto; }
input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; outline: none; }
input:focus { border-color: #7c3aed; }
.lieu-wrapper { position: relative; }
.suggestions { position: absolute; top: 100%; left: 0; right: 0; z-index: 200; background: #fff; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 10px 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); max-height: 240px; overflow-y: auto; display: none; }
.sug-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
.sug-item:hover { background: #f8f5ff; }
.sug-name { font-weight: 600; font-size: 13px; }
.sug-detail { font-size: 11px; color: #888; margin-top: 3px; }
.searching { padding: 12px; color: #888; font-size: 13px; }
#map { width: 100%; height: 300px; border-radius: 10px; margin-top: 15px; display: none; }
.status { margin-top: 10px; padding: 8px; background: #fff; border-radius: 8px; font-size: 12px; color: #333; }
</style>
</head>
<body>
<div class="wrapper">
    <h1>🗺️ Test Autocomplete Lieu</h1>
    <p style="margin-bottom:15px;color:#666;">Tapez un lieu (ex: Lac de Tunis, Sousse, Sfax...)</p>
    
    <div class="lieu-wrapper">
        <input type="text" id="lieu" placeholder="Rechercher un lieu..." autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
    </div>
    
    <div id="status" class="status">En attente de saisie...</div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var input = document.getElementById('lieu');
var sugsEl = document.getElementById('suggestions');
var statusEl = document.getElementById('status');
var mapEl = document.getElementById('map');
var map = null, marker = null, timer = null;

function showMap(lat, lon, label) {
    mapEl.style.display = 'block';
    if (!map) {
        map = L.map('map').setView([lat, lon], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
    } else {
        map.setView([lat, lon], 14);
    }
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();
    setTimeout(function(){ map.invalidateSize(); }, 200);
}

function search(q) {
    if (q.length < 3) { sugsEl.style.display = 'none'; return; }
    
    statusEl.textContent = '🔍 Recherche: "' + q + '"...';
    sugsEl.innerHTML = '<div class="searching">Recherche en cours...</div>';
    sugsEl.style.display = 'block';
    
    var url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=5&addressdetails=1&accept-language=fr';
    statusEl.textContent += ' URL: ' + url;
    
    fetch(url)
        .then(function(r) { 
            statusEl.textContent += ' | Status: ' + r.status;
            return r.json(); 
        })
        .then(function(data) {
            statusEl.textContent = '✅ ' + data.length + ' résultat(s) trouvé(s) pour "' + q + '"';
            
            if (!data.length) {
                sugsEl.innerHTML = '<div class="searching" style="color:red;">Aucun résultat</div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < data.length; i++) {
                var parts = data[i].display_name.split(', ');
                html += '<div class="sug-item" data-i="' + i + '">'
                    + '<div class="sug-name">' + parts[0] + '</div>'
                    + '<div class="sug-detail">' + parts.slice(1).join(', ') + '</div>'
                    + '</div>';
            }
            sugsEl.innerHTML = html;
            
            var items = sugsEl.querySelectorAll('.sug-item');
            for (var j = 0; j < items.length; j++) {
                (function(idx) {
                    items[idx].addEventListener('click', function() {
                        input.value = data[idx].display_name.substring(0, 190);
                        sugsEl.style.display = 'none';
                        showMap(parseFloat(data[idx].lat), parseFloat(data[idx].lon), data[idx].display_name);
                        statusEl.textContent = '📍 Sélectionné: ' + data[idx].display_name;
                    });
                })(j);
            }
        })
        .catch(function(err) {
            statusEl.textContent = '❌ Erreur: ' + err.message;
            sugsEl.innerHTML = '<div class="searching" style="color:red;">Erreur: ' + err.message + '</div>';
        });
}

input.addEventListener('input', function() {
    clearTimeout(timer);
    var val = this.value;
    timer = setTimeout(function() { search(val); }, 500);
});

document.addEventListener('click', function(e) {
    if (!e.target.closest('.lieu-wrapper')) sugsEl.style.display = 'none';
});
</script>
</body>
</html>
